[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_mysql",
    "php82Extensions.mbstring",
    "php82Extensions.tokenizer",
    "php82Extensions.xml",
    "php82Extensions.ctype",
    "php82Extensions.bcmath",
    "php82Extensions.fileinfo",
    "php82Extensions.openssl",
    "php82Extensions.curl",
    "php82Extensions.zip",
    "php82Extensions.gd",
    "composer"
]

[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction --no-scripts"
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"
